<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game of Life — wasm-pack</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #2a2e38;
        --text: #e6e8eb;
        --muted: #9aa0ab;
        --accent: #5b9dff;
        --accent-hover: #7bb0ff;
        --cell-alive: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: safe center;
        justify-content: safe center;
        overflow: auto;
        gap: 1.25rem;
        padding: 1.5rem;
      }

      header {
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      header p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      main {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }

      #game-of-life-canvas {
        border-radius: 6px;
        background: #000;
        image-rendering: pixelated;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      button {
        appearance: none;
        border: 1px solid var(--border);
        background: #1f232c;
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      button:hover {
        background: #262b36;
        border-color: var(--accent);
      }

      button:active {
        transform: translateY(1px);
      }

      button#play-pause {
        background: var(--accent);
        border-color: var(--accent);
        color: #06101f;
        min-width: 84px;
      }

      button#play-pause:hover {
        background: var(--accent-hover);
      }

      .speed {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .speed input[type="range"] {
        accent-color: var(--accent);
      }

      footer {
        color: var(--muted);
        font-size: 0.8rem;
      }

      noscript {
        display: block;
        max-width: 28rem;
        text-align: center;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Conway's Game of Life</h1>
      <p>Rust + WebAssembly, rendered on a canvas</p>
    </header>

    <main>
      <canvas id="game-of-life-canvas"></canvas>

      <div class="controls">
        <button id="play-pause">▶ Play</button>
        <!-- <button id="reset">Reset</button> -->
        <button id="random">Randomize</button>
        <button id="clear">Clear</button>
      </div>

      <div class="speed">
        <label for="ticks-range">Speed</label>
        <input id="ticks-range" type="range" min="1" max="20" value="1" />
        <span id="ticks-value">1 tick/frame</span>
      </div>
    </main>

    <footer id="fps"></footer>

    <noscript>
      This page contains WebAssembly and JavaScript content — please enable
      JavaScript in your browser.
    </noscript>

    <script src="./bootstrap.js"></script>
  </body>
</html>
